<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QAce</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fa;
      color: #222;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 20px;
    }

    img {
      max-width: 350px;
      width: 90%;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      color: #555;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .button {
      width: 240px;
      box-sizing: border-box;
      padding: 12px 24px;
      text-decoration: none;
      text-align: center;
      background: #e7b92c;
      color: #222;
      border-radius: 8px;
      font-weight: bold;
      transition: opacity 0.2s ease;
    }

    .button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="qace-logo.png" alt="QAce Logo">

    <h1>Software Quality Assurance</h1>

    <p>
      Building quality software, one bug at a time.
    </p>

    <p>
      🚧 Website under construction
    </p>

    <div class="buttons">

      <a class="button" href="about-me.html">
        About Me
      </a>

      <a class="button" href="qa-skills.html">
        QA Skills
      </a>

      <a class="button" href="projects.html">
        QA Projects
      </a>

      <a
        class="button"
        href="https://arlendev.github.io/qace-bug-lab/"
      >
        QAce Bug Lab
      </a>

    </div>

  </div>
</body>
</html>
